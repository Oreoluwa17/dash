<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSV Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c5bb;
    --text-primary: #1a1916; --text-secondary: #6b6860; --text-hint: #a09d96;
    --accent-bg: #1a1916; --accent-text: #f8f7f4;
    --radius: 10px; --radius-sm: 6px;
    --header-h: 56px; --tabs-h: 44px; --toolbar-h: 46px;
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; flex-direction: column; }

  .topbar { height: var(--header-h); background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 14px; flex-shrink: 0; }
  .board-title { font-size: 15px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-hint); white-space: nowrap; }
  .back-link { font-size: 13px; color: var(--text-secondary); text-decoration: none; white-space: nowrap; padding: 5px 10px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); transition: border-color 0.12s, color 0.12s; }
  .back-link:hover { border-color: var(--border-strong); color: var(--text-primary); }

  .tabs { height: var(--tabs-h); background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; padding: 0 20px; gap: 2px; flex-shrink: 0; }
  .tab { padding: 8px 14px 9px; font-size: 13px; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; display: flex; align-items: center; gap: 6px; }
  .tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--text-primary); font-weight: 500; border-bottom-color: var(--text-primary); }

  .toolbar { height: var(--toolbar-h); padding: 0 20px; background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .search-wrap { position: relative; flex: 1; max-width: 340px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--text-hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .search-input { width: 100%; padding: 6px 10px 6px 32px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text-primary); transition: border-color 0.15s; }
  .search-input:focus { outline: none; border-color: var(--accent-bg); }
  .search-input::placeholder { color: var(--text-hint); }
  .result-count { font-size: 12px; color: var(--text-hint); font-family: 'DM Mono', monospace; white-space: nowrap; }

  .views { flex: 1; overflow: hidden; position: relative; }
  .view { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .view.active { opacity: 1; pointer-events: auto; }

  #tableView { overflow-y: auto; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; z-index: 2; background: var(--surface); border-bottom: 0.5px solid var(--border); text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--text-secondary); }
  thead th.sort-asc::after { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }
  tbody tr { border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--bg); }
  tbody tr.highlighted { background: #fdf9ee; }
  tbody tr.highlighted:hover { background: #faf4e0; }
  tbody td { padding: 9px 14px; color: var(--text-primary); white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  tbody td.coord { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-hint); }
  .no-results { padding: 48px 24px; text-align: center; font-size: 14px; color: var(--text-hint); }

  #mapView { overflow: hidden; }
  #map { width: 100%; height: 100%; }
  .leaflet-popup-content-wrapper { border-radius: var(--radius-sm) !important; box-shadow: 0 2px 12px rgba(0,0,0,0.1) !important; border: 0.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .popup-title { font-weight: 500; margin-bottom: 4px; }
  .popup-coords { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
  .popup-fields { font-size: 12px; line-height: 1.8; color: var(--text-secondary); }
  .popup-fields strong { color: var(--text-primary); font-weight: 500; }

  .detail-panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 0.5px solid var(--border); padding: 16px 20px; transform: translateY(100%); transition: transform 0.2s cubic-bezier(0.22,1,0.36,1); z-index: 10; max-height: 44%; overflow-y: auto; }
  .detail-panel.open { transform: translateY(0); }
  .detail-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .detail-title { font-weight: 500; font-size: 14px; flex: 1; }
  .detail-close { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .detail-close:hover { color: var(--text-primary); background: var(--bg); }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .detail-cell { background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; }
  .detail-key { font-size: 10px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
  .detail-val { font-size: 13px; color: var(--text-primary); word-break: break-word; }

  .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; padding: 40px; }
  .error-state h2 { font-size: 18px; font-weight: 400; }
  .error-state p { font-size: 14px; color: var(--text-secondary); max-width: 380px; line-height: 1.6; }
  .error-state code { display: inline-block; margin-top: 8px; padding: 8px 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: left; max-width: 100%; word-break: break-all; }
  .error-state a { margin-top: 8px; font-size: 13px; padding: 8px 18px; background: var(--accent-bg); color: var(--accent-text); border-radius: var(--radius-sm); text-decoration: none; }
  .error-state a:hover { opacity: 0.85; }

  @media (max-width: 600px) { .topbar, .tabs, .toolbar { padding-left: 12px; padding-right: 12px; } tbody td, thead th { padding-left: 10px; padding-right: 10px; } }
</style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<script>
(function () {

  // ── utilities ─────────────────────────────────────────────────────────
  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function showError(title, detail, technicalMsg) {
    document.title = 'CSV Board';
    var techHtml = technicalMsg
      ? '<code>' + esc(technicalMsg) + '</code>'
      : '';
    document.body.innerHTML =
      '<div class="error-state">' +
        '<h2>' + esc(title) + '</h2>' +
        '<p>' + esc(detail) + '</p>' +
        techHtml +
        '<a href="index.html">← Upload a new CSV</a>' +
      '</div>';
  }

  // ── read & decode hash ────────────────────────────────────────────────
  var rawHash = window.location.hash.slice(1);

  if (!rawHash) {
    showError(
      'No board data found.',
      'This link does not contain any board data. Upload a CSV on the index page to generate a valid link.'
    );
    return;
  }

  /**
   * Decode the URL hash into a JS object.
   * Supports three formats (all produce base64url with no prefix):
   *   1. pako-deflated  -> try pako.inflate first
   *   2. plain base64url -> fallback via decodeURIComponent(escape(atob()))
   */
  function decodeHash(hash) {
    // Restore standard base64 padding & characters
    var b64 = hash.replace(/-/g, '+').replace(/_/g, '/');
    // Add padding if needed
    var pad = b64.length % 4;
    if (pad === 2) b64 += '==';
    else if (pad === 3) b64 += '=';

    var binStr = atob(b64); // throws if not valid base64

    // Try pako inflate (compressed format)
    if (typeof pako !== 'undefined') {
      try {
        var bytes = new Uint8Array(binStr.length);
        for (var i = 0; i < binStr.length; i++) bytes[i] = binStr.charCodeAt(i);
        var inflated = pako.inflate(bytes);
        return JSON.parse(new TextDecoder().decode(inflated));
      } catch (_) {
        // Not compressed — fall through to plain decode
      }
    }

    // Plain UTF-8 base64 (unescape+encodeURIComponent encoded)
    return JSON.parse(decodeURIComponent(escape(binStr)));
  }

  var payload;
  try {
    payload = decodeHash(rawHash);
  } catch (e) {
    showError(
      'Could not read board data.',
      'The link may be from an older version or was copied incorrectly. Try generating a new link.',
      e.message
    );
    return;
  }

  // ── validate payload ──────────────────────────────────────────────────
  var title    = payload.title    || 'Data Board';
  var latCol   = payload.latCol;
  var lngCol   = payload.lngCol;
  var labelCol = payload.labelCol || null;
  var headers  = payload.headers;
  var rows     = payload.rows;

  if (!Array.isArray(rows) || rows.length === 0) {
    showError('Empty board.', 'No data rows were found in this board link.');
    return;
  }
  if (!Array.isArray(headers) || headers.length === 0) {
    showError('Invalid board data.', 'The board is missing column header information.');
    return;
  }
  if (!latCol || !lngCol) {
    showError('Invalid board data.', 'Latitude or longitude column information is missing.');
    return;
  }

  document.title = title;

  // ── state ─────────────────────────────────────────────────────────────
  var sortCol = null, sortDir = 1, filterText = '', selectedRow = null;
  var leafletMap = null, markerLayer = null;

  function getLabel(row) {
    return (labelCol && row[labelCol]) ? row[labelCol] : (row[latCol] + ', ' + row[lngCol]);
  }
  function getFiltered() {
    if (!filterText) return rows;
    var q = filterText.toLowerCase();
    return rows.filter(function(r) {
      return Object.keys(r).some(function(k) { return String(r[k]).toLowerCase().indexOf(q) !== -1; });
    });
  }
  function getSorted(arr) {
    if (!sortCol) return arr;
    return arr.slice().sort(function(a, b) {
      var va = a[sortCol] || '', vb = b[sortCol] || '';
      var na = parseFloat(va), nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      return va.localeCompare(vb) * sortDir;
    });
  }

  // ── build page chrome ─────────────────────────────────────────────────
  document.body.innerHTML =
    '<div class="topbar">' +
      '<a class="back-link" href="index.html">← Upload</a>' +
      '<span class="board-title">' + esc(title) + '</span>' +
      '<span class="row-count">' + rows.length + ' rows</span>' +
    '</div>' +
    '<div class="tabs">' +
      '<button class="tab active" id="tabTable" onclick="switchTab(\'table\')">' +
        '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>Table' +
      '</button>' +
      '<button class="tab" id="tabMap" onclick="switchTab(\'map\')">' +
        '<svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>Map' +
      '</button>' +
    '</div>' +
    '<div class="toolbar">' +
      '<div class="search-wrap">' +
        '<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>' +
        '<input class="search-input" id="searchInput" placeholder="Search rows\u2026" oninput="onSearch(this.value)" />' +
      '</div>' +
      '<span class="result-count" id="resultCount"></span>' +
    '</div>' +
    '<div class="views">' +
      '<div class="view active" id="tableView"></div>' +
      '<div class="view" id="mapView"><div id="map"></div></div>' +
    '</div>' +
    '<div class="detail-panel" id="detailPanel">' +
      '<div class="detail-header">' +
        '<span class="detail-title" id="detailTitle"></span>' +
        '<button class="detail-close" onclick="closeDetail()">&#x2715;</button>' +
      '</div>' +
      '<div class="detail-grid" id="detailGrid"></div>' +
    '</div>';

  // ── table render ──────────────────────────────────────────────────────
  function renderTable() {
    var filtered = getSorted(getFiltered());
    var el = document.getElementById('tableView');
    var rc = document.getElementById('resultCount');
    if (rc) rc.textContent = filterText ? (filtered.length + ' of ' + rows.length) : '';

    if (!filtered.length) {
      el.innerHTML = '<div class="no-results">No rows match your search.</div>';
      return;
    }

    var coordSet = {};
    coordSet[latCol] = true; coordSet[lngCol] = true;

    var html = '<table><thead><tr>';
    headers.forEach(function(h) {
      var cls = sortCol === h ? (sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
      html += '<th class="' + cls + '" onclick="sortBy(\'' + esc(h) + '\')">' + esc(h) + '</th>';
    });
    html += '</tr></thead><tbody>';

    filtered.forEach(function(row) {
      var idx = rows.indexOf(row);
      html += '<tr class="' + (selectedRow === row ? 'highlighted' : '') + '" onclick="selectRow(' + idx + ')">';
      headers.forEach(function(h) {
        var val = row[h] != null ? row[h] : '';
        html += '<td class="' + (coordSet[h] ? 'coord' : '') + '" title="' + esc(val) + '">' + esc(val || '—') + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // ── map render ────────────────────────────────────────────────────────
  function initMap() {
    if (leafletMap) return;
    if (typeof L === 'undefined') {
      var mv = document.getElementById('mapView');
      if (mv) mv.innerHTML = '<div class="no-results">Map unavailable — Leaflet library failed to load.</div>';
      return;
    }
    leafletMap = L.map('map', { zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '\u00a9 OpenStreetMap \u00a9 CartoDB',
      subdomains: 'abcd',
      maxZoom: 19
    }).addTo(leafletMap);
    markerLayer = L.featureGroup().addTo(leafletMap);
    renderMarkers();
  }

  function renderMarkers() {
    if (!leafletMap || !markerLayer) return;
    markerLayer.clearLayers();

    var filtered = getSorted(getFiltered());
    var icon = L.divIcon({
      className: '',
      html: '<div style="width:10px;height:10px;background:#1a1916;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.28);"></div>',
      iconSize: [10, 10],
      iconAnchor: [5, 5]
    });

    filtered.forEach(function(row) {
      var lat = parseFloat(row[latCol]);
      var lng = parseFloat(row[lngCol]);
      if (isNaN(lat) || isNaN(lng)) return;

      var label = getLabel(row);
      var extraHtml = headers
        .filter(function(h) { return h !== latCol && h !== lngCol; })
        .slice(0, 5)
        .map(function(h) {
          return row[h] ? ('<span><strong>' + esc(h) + ':</strong> ' + esc(row[h]) + '</span>') : '';
        })
        .filter(Boolean)
        .join('<br>');

      var popup =
        '<div class="popup-title">' + esc(label) + '</div>' +
        '<div class="popup-coords">' + lat.toFixed(5) + ', ' + lng.toFixed(5) + '</div>' +
        (extraHtml ? '<div class="popup-fields">' + extraHtml + '</div>' : '');

      L.marker([lat, lng], { icon: icon }).addTo(markerLayer).bindPopup(popup);
    });

    if (markerLayer.getLayers().length > 0) {
      try { leafletMap.fitBounds(markerLayer.getBounds(), { padding: [40, 40] }); } catch (_) {}
    }
  }

  // ── global event handlers ─────────────────────────────────────────────
  window.switchTab = function(tab) {
    var isTable = (tab === 'table');
    document.getElementById('tabTable').classList.toggle('active', isTable);
    document.getElementById('tabMap').classList.toggle('active', !isTable);
    document.getElementById('tableView').classList.toggle('active', isTable);
    document.getElementById('mapView').classList.toggle('active', !isTable);
    if (!isTable) {
      setTimeout(function() {
        initMap();
        if (leafletMap) leafletMap.invalidateSize();
      }, 60);
    }
  };

  window.onSearch = function(val) {
    filterText = val;
    renderTable();
    if (leafletMap) renderMarkers();
  };

  window.sortBy = function(col) {
    sortDir = (sortCol === col) ? sortDir * -1 : 1;
    sortCol = col;
    renderTable();
  };

  window.selectRow = function(idx) {
    selectedRow = rows[idx];
    document.getElementById('detailTitle').textContent = getLabel(selectedRow);
    document.getElementById('detailGrid').innerHTML = headers.map(function(h) {
      return '<div class="detail-cell">' +
        '<div class="detail-key">' + esc(h) + '</div>' +
        '<div class="detail-val">' + esc(selectedRow[h] || '—') + '</div>' +
        '</div>';
    }).join('');
    document.getElementById('detailPanel').classList.add('open');
    renderTable();
  };

  window.closeDetail = function() {
    selectedRow = null;
    document.getElementById('detailPanel').classList.remove('open');
    renderTable();
  };

  // ── first render ──────────────────────────────────────────────────────
  renderTable();

})();
</script>
</body>
</html>
