<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSV Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7f4; --surface: #ffffff; --border: #e4e2db; --border-strong: #c8c5bb;
    --text-primary: #1a1916; --text-secondary: #6b6860; --text-hint: #a09d96;
    --accent-bg: #1a1916; --accent-text: #f8f7f4;
    --radius: 10px; --radius-sm: 6px;
    --header-h: 56px; --tabs-h: 44px; --toolbar-h: 46px;
    --c-approve: #2d6a4f; --c-approve-bg: #eaf4ef; --c-approve-border: #b7dfcc;
    --c-reject: #9b2c2c;  --c-reject-bg: #fdf0f0;  --c-reject-border: #f5c6c6;
    --c-flag: #92400e;    --c-flag-bg: #fef3e2;    --c-flag-border: #f9d8a0;
    --c-comment: #1e3a8a; --c-comment-bg: #eff6ff;  --c-comment-border: #bfdbfe;
  }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); display: flex; flex-direction: column; }

  .topbar { height: var(--header-h); background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 14px; flex-shrink: 0; }
  .board-title { font-size: 15px; font-weight: 500; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row-count { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-hint); white-space: nowrap; }
  .sheet-status { font-size: 12px; color: var(--text-hint); font-family: 'DM Mono', monospace; white-space: nowrap; }
  .sheet-status.ok  { color: var(--c-approve); }
  .sheet-status.err { color: var(--c-reject); }

  /* Export button */
  .export-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: none; border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 12px; font-family: 'DM Sans', sans-serif; color: var(--text-secondary); cursor: pointer; white-space: nowrap; transition: background 0.12s, color 0.12s, border-color 0.12s; position: relative; }
  .export-btn:hover { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent-bg); }
  .export-btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

  /* Export dropdown */
  .export-wrap { position: relative; }
  .export-menu { display: none; position: absolute; right: 0; top: calc(100% + 6px); background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-sm); box-shadow: 0 4px 16px rgba(0,0,0,0.08); min-width: 200px; z-index: 100; overflow: hidden; }
  .export-menu.open { display: block; }
  .export-menu-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; font-size: 13px; cursor: pointer; transition: background 0.1s; border: none; background: none; width: 100%; text-align: left; font-family: 'DM Sans', sans-serif; color: var(--text-primary); }
  .export-menu-item:hover { background: var(--bg); }
  .export-menu-item .fmt-icon { width: 28px; height: 22px; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-family: 'DM Mono', monospace; font-size: 9px; font-weight: 500; flex-shrink: 0; }
  .fmt-csv  { background: #eaf4ef; color: #2d6a4f; }
  .fmt-spss { background: #eff6ff; color: #1e3a8a; }
  .fmt-shp  { background: #fef3e2; color: #92400e; }
  .export-menu-item .fmt-label { flex: 1; }
  .export-menu-item .fmt-desc { font-size: 11px; color: var(--text-hint); display: block; margin-top: 1px; font-family: 'DM Mono', monospace; }
  .export-divider { height: 0.5px; background: var(--border); margin: 2px 0; }

  .tabs { height: var(--tabs-h); background: var(--surface); border-bottom: 0.5px solid var(--border); display: flex; align-items: flex-end; padding: 0 20px; gap: 2px; flex-shrink: 0; }
  .tab { padding: 8px 14px 9px; font-size: 13px; cursor: pointer; border: none; background: none; font-family: 'DM Sans', sans-serif; color: var(--text-secondary); border-bottom: 2px solid transparent; transition: color 0.12s, border-color 0.12s; display: flex; align-items: center; gap: 6px; }
  .tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--text-primary); font-weight: 500; border-bottom-color: var(--text-primary); }

  .toolbar { height: var(--toolbar-h); padding: 0 20px; background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .search-wrap { position: relative; flex: 1; max-width: 340px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; stroke: var(--text-hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .search-input { width: 100%; padding: 6px 10px 6px 32px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text-primary); transition: border-color 0.15s; }
  .search-input:focus { outline: none; border-color: var(--accent-bg); }
  .search-input::placeholder { color: var(--text-hint); }
  .result-count { font-size: 12px; color: var(--text-hint); font-family: 'DM Mono', monospace; white-space: nowrap; }

  .views { flex: 1; overflow: hidden; position: relative; }
  .view { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
  .view.active { opacity: 1; pointer-events: auto; }

  #tableView { overflow-y: auto; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { position: sticky; top: 0; z-index: 2; background: var(--surface); border-bottom: 0.5px solid var(--border); text-align: left; padding: 9px 14px; font-size: 11px; font-weight: 500; font-family: 'DM Mono', monospace; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; white-space: nowrap; cursor: pointer; user-select: none; }
  thead th:hover { color: var(--text-secondary); }
  thead th.sort-asc::after { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }
  thead th.th-status { cursor: default; }
  thead th.th-status:hover { color: var(--text-hint); }
  tbody tr { border-bottom: 0.5px solid var(--border); cursor: pointer; transition: background 0.1s; }
  tbody tr:hover { background: var(--bg); }
  tbody tr.highlighted { background: #fdf9ee; }
  tbody tr.highlighted:hover { background: #faf4e0; }
  tbody td { padding: 9px 14px; color: var(--text-primary); white-space: nowrap; max-width: 220px; overflow: hidden; text-overflow: ellipsis; }
  tbody td.coord { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-hint); }
  .no-results { padding: 48px 24px; text-align: center; font-size: 14px; color: var(--text-hint); }

  .badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 0.5px solid transparent; white-space: nowrap; }
  .badge-approve { background: var(--c-approve-bg); color: var(--c-approve); border-color: var(--c-approve-border); }
  .badge-reject  { background: var(--c-reject-bg);  color: var(--c-reject);  border-color: var(--c-reject-border); }
  .badge-flag    { background: var(--c-flag-bg);    color: var(--c-flag);    border-color: var(--c-flag-border); }
  .badge-comment { background: var(--c-comment-bg); color: var(--c-comment); border-color: var(--c-comment-border); }

  #mapView { overflow: hidden; }
  #map { width: 100%; height: 100%; }
  .leaflet-popup-content-wrapper { border-radius: var(--radius-sm) !important; box-shadow: 0 2px 12px rgba(0,0,0,0.1) !important; border: 0.5px solid var(--border); font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .popup-title { font-weight: 500; margin-bottom: 4px; }
  .popup-coords { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
  .popup-fields { font-size: 12px; line-height: 1.8; color: var(--text-secondary); }
  .popup-fields strong { color: var(--text-primary); font-weight: 500; }

  .detail-panel { position: absolute; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 0.5px solid var(--border); transform: translateY(100%); transition: transform 0.2s cubic-bezier(0.22,1,0.36,1); z-index: 10; max-height: 72%; overflow-y: auto; }
  .detail-panel.open { transform: translateY(0); }
  .detail-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 1; }
  .detail-title { font-weight: 500; font-size: 14px; flex: 1; }
  .detail-close { background: none; border: none; cursor: pointer; color: var(--text-hint); font-size: 18px; line-height: 1; padding: 2px 6px; border-radius: 4px; }
  .detail-close:hover { color: var(--text-primary); background: var(--bg); }
  .detail-body { padding: 16px 20px; display: flex; flex-direction: column; gap: 20px; }
  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 8px; }
  .detail-cell { background: var(--bg); border-radius: var(--radius-sm); padding: 8px 10px; }
  .detail-key { font-size: 10px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; font-family: 'DM Mono', monospace; margin-bottom: 3px; }
  .detail-val { font-size: 13px; color: var(--text-primary); word-break: break-word; }

  .review-section { border-top: 0.5px solid var(--border); padding-top: 16px; }
  .review-label { font-size: 11px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.08em; font-family: 'DM Mono', monospace; margin-bottom: 12px; }
  .reviewer-row { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .reviewer-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
  .reviewer-input { flex: 1; max-width: 240px; padding: 7px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text-primary); transition: border-color 0.15s; }
  .reviewer-input:focus { outline: none; border-color: var(--accent-bg); }
  .reviewer-input::placeholder { color: var(--text-hint); }
  .review-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .action-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; cursor: pointer; border: 0.5px solid transparent; transition: opacity 0.12s, transform 0.1s; }
  .action-btn:active:not(:disabled) { transform: scale(0.97); }
  .action-btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .action-btn.approve { background: var(--c-approve-bg); color: var(--c-approve); border-color: var(--c-approve-border); }
  .action-btn.reject  { background: var(--c-reject-bg);  color: var(--c-reject);  border-color: var(--c-reject-border); }
  .action-btn.flag    { background: var(--c-flag-bg);    color: var(--c-flag);    border-color: var(--c-flag-border); }
  .action-btn.comment { background: var(--c-comment-bg); color: var(--c-comment); border-color: var(--c-comment-border); }
  .action-btn:hover:not(:disabled) { opacity: 0.78; }
  .comment-input { width: 100%; padding: 8px 12px; font-size: 13px; font-family: 'DM Sans', sans-serif; background: var(--surface); border: 0.5px solid var(--border-strong); border-radius: var(--radius-sm); color: var(--text-primary); resize: vertical; min-height: 60px; transition: border-color 0.15s; }
  .comment-input:focus { outline: none; border-color: var(--accent-bg); }
  .comment-input::placeholder { color: var(--text-hint); }
  .comment-input:disabled { opacity: 0.4; }
  .review-feedback { margin-top: 10px; font-size: 13px; padding: 9px 12px; border-radius: var(--radius-sm); display: none; }
  .review-feedback.visible { display: block; }
  .review-feedback.ok  { background: var(--c-approve-bg); color: var(--c-approve); border: 0.5px solid var(--c-approve-border); }
  .review-feedback.err { background: var(--c-reject-bg);  color: var(--c-reject);  border: 0.5px solid var(--c-reject-border); }
  .reviews-list { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
  .review-item { padding: 10px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border); background: var(--bg); }
  .review-item-top { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
  .review-item-body { font-size: 12px; color: var(--text-secondary); line-height: 1.55; word-break: break-word; }
  .review-item-meta { font-size: 11px; color: var(--text-hint); font-family: 'DM Mono', monospace; margin-left: auto; }
  .not-configured { padding: 12px 14px; background: var(--c-flag-bg); color: var(--c-flag); border: 0.5px solid var(--c-flag-border); border-radius: var(--radius-sm); font-size: 13px; line-height: 1.6; }

  .error-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; text-align: center; padding: 40px; }
  .error-state h2 { font-size: 18px; font-weight: 400; }
  .error-state p { font-size: 14px; color: var(--text-secondary); max-width: 380px; line-height: 1.6; }
  .error-state code { display: inline-block; margin-top: 8px; padding: 8px 12px; background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 12px; color: var(--text-secondary); text-align: left; max-width: 100%; word-break: break-all; }

  @media (max-width: 600px) {
    .topbar, .tabs, .toolbar { padding-left: 12px; padding-right: 12px; }
    tbody td, thead th { padding-left: 10px; padding-right: 10px; }
    .review-actions { gap: 6px; }
    .action-btn { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
(function () {

  // ── config ────────────────────────────────────────────────────────────
  var SHEET_URL = ''; // paste your Apps Script URL here
  var SHEET_READY = SHEET_URL.indexOf('script.google.com') !== -1;

  // ── utilities ─────────────────────────────────────────────────────────
  function esc(s) {
    return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function showError(title,detail,tech) {
    document.title='CSV Board';
    document.body.innerHTML='<div class="error-state"><h2>'+esc(title)+'</h2><p>'+esc(detail)+'</p>'+(tech?'<code>'+esc(tech)+'</code>':'')+' </div>';
  }
  function fmtDate(iso){if(!iso)return '';try{return new Date(iso).toLocaleString();}catch(_){return iso;}}
  function downloadBlob(blob,name){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(function(){URL.revokeObjectURL(a.href);},1000);}

  // ── decode hash ───────────────────────────────────────────────────────
  var rawHash=window.location.hash.slice(1);
  if(!rawHash){showError('No board data found.','Upload a CSV to generate a valid board link.');return;}

  function decodeHash(hash) {
    var b64=hash.replace(/-/g,'+').replace(/_/g,'/');
    var pad=b64.length%4;
    if(pad===2)b64+='==';else if(pad===3)b64+='=';
    var binStr=atob(b64);
    if(typeof pako!=='undefined'){
      try{
        var bytes=new Uint8Array(binStr.length);
        for(var i=0;i<binStr.length;i++)bytes[i]=binStr.charCodeAt(i);
        return JSON.parse(new TextDecoder().decode(pako.inflate(bytes)));
      }catch(_){}
    }
    return JSON.parse(decodeURIComponent(escape(binStr)));
  }

  var payload;
  try{payload=decodeHash(rawHash);}
  catch(e){showError('Could not read board data.','The link may be corrupted.',e.message);return;}

  var title    = payload.title    || 'Data Board';
  var latCol   = payload.latCol;
  var lngCol   = payload.lngCol;
  var labelCol = payload.labelCol || null;
  var headers  = payload.headers;
  var rows     = payload.rows;
  var spssLabels = payload.spssLabels || null; // {colName: "Label"}

  if(!Array.isArray(rows)||!rows.length)      {showError('Empty board.','No data rows found.');return;}
  if(!Array.isArray(headers)||!headers.length){showError('Invalid board.','Missing column headers.');return;}

  document.title=title;

  // ── Google Sheets reviews ─────────────────────────────────────────────
  var reviewCache={};
  function rowKey(row){
    var lat=parseFloat(row[latCol]).toFixed(5),lng=parseFloat(row[lngCol]).toFixed(5);
    return lat+'|'+lng+'|'+(labelCol?row[labelCol]||'':'');
  }
  function buildUrl(params){
    return SHEET_URL+'?'+Object.keys(params).map(function(k){return encodeURIComponent(k)+'='+encodeURIComponent(params[k]);}).join('&');
  }
  function fetchReviews(cb){
    if(!SHEET_READY){cb(false);return;}
    fetch(buildUrl({action:'get'})).then(function(r){return r.json();}).then(function(data){
      reviewCache={};
      if(!data.ok||!Array.isArray(data.reviews)){cb(false);return;}
      data.reviews.forEach(function(rev){var k=rev.rowKey;if(k){if(!reviewCache[k])reviewCache[k]=[];reviewCache[k].push(rev);}});
      cb(true);
    }).catch(function(){cb(false);});
  }
  function postReview(row,action,comment,reviewer,cb){
    if(!SHEET_READY){cb(false,'Sheet URL not configured.');return;}
    var key=rowKey(row),label=getLabel(row);
    fetch(buildUrl({action:'post',action2:action,rowKey:key,rowLabel:label,comment:comment,reviewer:reviewer||'anonymous'}))
      .then(function(r){return r.json();}).then(function(data){
        if(data.ok){
          if(!reviewCache[key])reviewCache[key]=[];
          reviewCache[key].push({rowKey:key,rowLabel:label,action:action,comment:comment,reviewer:reviewer||'anonymous',timestamp:data.timestamp||new Date().toISOString()});
          cb(true,null);
        }else{cb(false,data.error||'Unknown error');}
      }).catch(function(e){cb(false,e.message);});
  }

  // ── state ─────────────────────────────────────────────────────────────
  var sortCol=null,sortDir=1,filterText='',selectedRow=null;
  var leafletMap=null,markerLayer=null;

  function getLabel(row){return(labelCol&&row[labelCol])?row[labelCol]:(row[latCol]+', '+row[lngCol]);}
  function getFiltered(){
    if(!filterText)return rows;
    var q=filterText.toLowerCase();
    return rows.filter(function(r){return Object.keys(r).some(function(k){return String(r[k]).toLowerCase().indexOf(q)!==-1;});});
  }
  function getSorted(arr){
    if(!sortCol)return arr;
    return arr.slice().sort(function(a,b){
      var va=a[sortCol]||'',vb=b[sortCol]||'';
      var na=parseFloat(va),nb=parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb))return(na-nb)*sortDir;
      return va.localeCompare(vb)*sortDir;
    });
  }
  function latestAction(row){var k=rowKey(row),revs=reviewCache[k];return(revs&&revs.length)?revs[revs.length-1]:null;}
  function rowStatusBadge(row){
    var l=latestAction(row);if(!l)return '';
    var m={approve:'<span class="badge badge-approve">✓ Approved</span>',reject:'<span class="badge badge-reject">✕ Rejected</span>',flag:'<span class="badge badge-flag">⚑ Flagged</span>',comment:'<span class="badge badge-comment">✎ Comment</span>'};
    return m[l.action]||'';
  }
  function markerColor(row){var l=latestAction(row);if(!l)return '#1a1916';return{approve:'#2d6a4f',reject:'#9b2c2c',flag:'#92400e',comment:'#1e3a8a'}[l.action]||'#1a1916';}

  // ════════════════════════════════════════════════════════════════════════
  //  EXPORT ENGINES
  // ════════════════════════════════════════════════════════════════════════

  // ── 1. CSV export ─────────────────────────────────────────────────────
  function exportCSV() {
    var data = getSorted(getFiltered());
    var lines = [headers.map(function(h){return '"'+h.replace(/"/g,'""')+'"';}).join(',')];
    data.forEach(function(row){
      lines.push(headers.map(function(h){
        var v=String(row[h]||'');return'"'+v.replace(/"/g,'""')+'"';
      }).join(','));
    });
    var blob=new Blob([lines.join('\r\n')],{type:'text/csv'});
    downloadBlob(blob, (title||'board').replace(/\s+/g,'_')+'.csv');
  }

  // ── 2. SPSS .sav export ───────────────────────────────────────────────
  // Writes a minimal but valid SPSS System File (SAV) v2 format.
  // Numeric columns (parseable as float) become SPSS numeric vars;
  // everything else becomes string vars (A8 = 8 chars per segment).
  function exportSPSS() {
    var data = getSorted(getFiltered());
    if(!data.length){alert('No data to export.');return;}

    // Detect column types
    var colTypes = {}; // 'num' | 'str'
    headers.forEach(function(h){
      var allNum = data.every(function(r){var v=r[h];return v===''||(!isNaN(parseFloat(v))&&isFinite(v));});
      colTypes[h] = allNum ? 'num' : 'str';
    });

    // Helper: write little-endian int32
    function i32(v){var b=new ArrayBuffer(4);new DataView(b).setInt32(0,v,true);return new Uint8Array(b);}
    function f64(v){var b=new ArrayBuffer(8);new DataView(b).setFloat64(0,v,true);return new Uint8Array(b);}
    function pad(s,n,ch){ch=ch||' ';while(s.length<n)s+=ch;return s.slice(0,n);}
    function str8(s){return padStr(s,8);}
    function padStr(s,n){var r=new Uint8Array(n);var src=new TextEncoder().encode(s.slice(0,n));r.set(src);return r;}

    var chunks=[];
    function push(u8){chunks.push(u8);}

    // ── Record type 1: file header ──
    var hdr=new Uint8Array(176);
    var magic='$FL2';var recType=new TextEncoder().encode(magic);hdr.set(recType,0);
    // prod_name (60 bytes)
    hdr.set(padStr('CSVBoard Export',60),4);
    var dv=new DataView(hdr.buffer);
    dv.setInt32(64,2,true);   // layout_code = 2 (little-endian)
    dv.setInt32(68,headers.length,true); // ncases_per_row (vars in one case)
    dv.setInt32(72,0,true);   // compression: 0 = none
    dv.setInt32(76,0,true);   // weight index
    dv.setInt32(80,data.length,true); // ncases
    dv.setFloat64(84,100.0,true);     // bias (ignored when no compression)
    // creation date/time 9+8 bytes
    var now=new Date();
    var ds=pad(String(now.getDate()),2,'0')+' '+['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][now.getMonth()]+' '+String(now.getFullYear()).slice(2);
    var ts=pad(String(now.getHours()),2,'0')+':'+pad(String(now.getMinutes()),2,'0')+':'+pad(String(now.getSeconds()),2,'0');
    hdr.set(padStr(ds,9),92);
    hdr.set(padStr(ts,8),101);
    hdr.set(padStr('CSVBoard',64),109); // file_label
    push(hdr);

    // ── Record type 2: variable records ──
    headers.forEach(function(h,idx){
      var label = spssLabels && spssLabels[h] ? spssLabels[h] : h;
      var isNum = colTypes[h]==='num';
      var varName = h.replace(/[^A-Za-z0-9_]/g,'_').slice(0,8);
      varName = pad(varName,8);

      var rec=new Uint8Array(32);
      var rdv=new DataView(rec.buffer);
      rdv.setInt32(0,2,true);          // record type
      rdv.setInt32(4,isNum?0:1,true);  // type: 0=num, 1..255=string width segment
      rdv.setInt32(8,0,true);          // has_var_label (set below)
      rdv.setInt32(12,0,true);         // n_missing_values
      // print/write format: F8.2 for num, A8 for str
      rec[16]=isNum?5:1; rec[17]=isNum?2:0; rec[18]=isNum?8:8; rec[19]=0; // print
      rec[20]=isNum?5:1; rec[21]=isNum?2:0; rec[22]=isNum?8:8; rec[23]=0; // write
      rec.set(padStr(varName,8),24);

      // variable label
      var labelBytes=new TextEncoder().encode(label.slice(0,120));
      var labelLen=labelBytes.length;
      var labelPadded=Math.ceil(labelLen/4)*4;
      rdv.setInt32(8,1,true); // has_var_label=1
      rdv.setInt32(12,0,true);

      push(rec);
      push(i32(labelLen));
      var lbuf=new Uint8Array(labelPadded);lbuf.set(labelBytes);push(lbuf);
    });

    // ── Record type 999: end of dictionary ──
    push(i32(999));push(i32(0));

    // ── Data: uncompressed ──
    data.forEach(function(row){
      headers.forEach(function(h){
        var v=row[h]||'';
        if(colTypes[h]==='num'){
          var n=parseFloat(v);
          push(f64(isNaN(n)?-1.7976931348623157e+308:n)); // sysmiss for blanks
        } else {
          push(padStr(v,8));
        }
      });
    });

    var total=chunks.reduce(function(s,c){return s+c.length;},0);
    var out=new Uint8Array(total);var off=0;
    chunks.forEach(function(c){out.set(c,off);off+=c.length;});
    downloadBlob(new Blob([out],{type:'application/octet-stream'}),(title||'board').replace(/\s+/g,'_')+'.sav');
  }

  // ── 3. Shapefile .shp export (zipped .shp + .shx + .dbf + .prj) ──────
  function exportShapefile() {
    var data = getSorted(getFiltered());
    if(!data.length){alert('No data to export.');return;}

    // Filter to valid coords
    var points=data.map(function(row){
      return {lat:parseFloat(row[latCol]),lng:parseFloat(row[lngCol]),row:row};
    }).filter(function(p){return !isNaN(p.lat)&&!isNaN(p.lng);});
    if(!points.length){alert('No valid coordinates found.');return;}

    // Bounding box
    var minX=points[0].lng,maxX=points[0].lng,minY=points[0].lat,maxY=points[0].lat;
    points.forEach(function(p){
      if(p.lng<minX)minX=p.lng;if(p.lng>maxX)maxX=p.lng;
      if(p.lat<minY)minY=p.lat;if(p.lat>maxY)maxY=p.lat;
    });

    // Helpers
    function i32BE(v){var b=new ArrayBuffer(4);new DataView(b).setInt32(0,v,false);return new Uint8Array(b);}
    function i32LE(v){var b=new ArrayBuffer(4);new DataView(b).setInt32(0,v,true);return new Uint8Array(b);}
    function f64LE(v){var b=new ArrayBuffer(8);new DataView(b).setFloat64(0,v,true);return new Uint8Array(b);}
    function concat(arrs){var t=arrs.reduce(function(s,a){return s+a.length;},0);var o=new Uint8Array(t);var p=0;arrs.forEach(function(a){o.set(a,p);p+=a.length;});return o;}

    var n=points.length;
    var recContentLen=20; // 4(shpType)+8(x)+8(y) = 20 bytes
    var shpLen=50+n*(4+recContentLen/2); // in 16-bit words (header=50words, each rec header=4words + content)

    // SHP
    function shpHeader(fileLen){
      return concat([
        i32BE(9994),i32BE(0),i32BE(0),i32BE(0),i32BE(0),i32BE(0),
        i32BE(fileLen),
        i32LE(1000),i32LE(1), // version, shapeType=Point
        f64LE(minX),f64LE(minY),f64LE(maxX),f64LE(maxY),
        f64LE(0),f64LE(0),f64LE(0),f64LE(0) // Z/M ranges
      ]);
    }
    var shpRecs=[];
    points.forEach(function(p,i){
      shpRecs.push(concat([
        i32BE(i+1),              // record number (1-based)
        i32BE(recContentLen/2),  // content length in 16-bit words
        i32LE(1),                // shape type = Point
        f64LE(p.lng),
        f64LE(p.lat)
      ]));
    });
    var shpData=concat([shpHeader(shpLen)].concat(shpRecs));

    // SHX (index file)
    var shxLen=50+n*4; // header + n*8bytes / 2
    var shxRecs=[];
    var offset=50; // offset in 16-bit words from start
    points.forEach(function(){
      shxRecs.push(concat([i32BE(offset),i32BE(recContentLen/2+4)]));
      offset+=4+(recContentLen/2);
    });
    var shxData=concat([shpHeader(shxLen)].concat(shxRecs));

    // DBF (dBase III) — attribute table
    // Only include non-lat/lng columns, truncated to 10 char field names, max 254 char values
    var dbfCols=headers.filter(function(h){return h!==latCol&&h!==lngCol;});
    if(labelCol&&dbfCols.indexOf(labelCol)===-1) dbfCols.unshift(labelCol);

    var fieldDefs=dbfCols.map(function(h){
      var name=h.replace(/[^A-Za-z0-9_]/g,'_').slice(0,10);
      return {name:name,origName:h,width:Math.min(254,Math.max(8,h.length+4))};
    });
    var recSize=1+fieldDefs.reduce(function(s,f){return s+f.width;},0);
    var headerSize=32+fieldDefs.length*32+1;

    var dbfBuf=new Uint8Array(headerSize+n*recSize);
    var dbv=new DataView(dbfBuf.buffer);
    dbv.setUint8(0,3); // version
    dbv.setUint8(1,now.getFullYear()-1900);
    dbv.setUint8(2,now.getMonth()+1);
    dbv.setUint8(3,now.getDate());
    dbv.setUint32(4,n,true);           // number of records
    dbv.setUint16(8,headerSize,true);  // header size
    dbv.setUint16(10,recSize,true);    // record size

    // Field descriptors
    var fOff=32;
    fieldDefs.forEach(function(f){
      var nameBytes=new TextEncoder().encode(f.name);
      dbfBuf.set(nameBytes,fOff);
      dbv.setUint8(fOff+11,67); // 'C' = character
      dbv.setUint8(fOff+16,f.width);
      fOff+=32;
    });
    dbfBuf[fOff]=0x0D; // header terminator

    // Records
    var rOff=headerSize;
    points.forEach(function(p){
      dbfBuf[rOff]=0x20; rOff++; // deletion flag = space
      fieldDefs.forEach(function(f){
        var val=String(p.row[f.origName]||'').slice(0,f.width);
        while(val.length<f.width)val+=' ';
        var enc=new TextEncoder().encode(val.slice(0,f.width));
        dbfBuf.set(enc,rOff);rOff+=f.width;
      });
    });

    // PRJ — WGS84 projection
    var prj='GEOGCS["GCS_WGS_1984",DATUM["D_WGS_1984",SPHEROID["WGS_1984",6378137.0,298.257223563]],PRIMEM["Greenwich",0.0],UNIT["Degree",0.0174532925199433]]';

    // ZIP it all up (minimal zip, no compression)
    function zipEntry(name,data){
      var nameB=new TextEncoder().encode(name);
      var local=concat([
        new Uint8Array([0x50,0x4B,0x03,0x04]), // local sig
        new Uint8Array([0x14,0x00]),             // version needed
        new Uint8Array([0x00,0x00]),             // flags
        new Uint8Array([0x00,0x00]),             // compression: stored
        new Uint8Array([0x00,0x00,0x00,0x00]),   // mod time/date
        crc32bytes(data),
        i32LE(data.length),i32LE(data.length),  // compressed = uncompressed
        new Uint8Array([nameB.length,0]),         // filename length
        new Uint8Array([0x00,0x00]),             // extra length
        nameB, data
      ]);
      return {local:local,name:nameB,size:data.length,crc:crc32bytes(data)};
    }

    function crc32bytes(data){
      // CRC32
      var table=[];
      for(var i=0;i<256;i++){var c=i;for(var j=0;j<8;j++)c=c&1?(0xEDB88320^(c>>>1)):(c>>>1);table[i]=c;}
      var crc=0xFFFFFFFF;
      for(var k=0;k<data.length;k++)crc=table[(crc^data[k])&0xFF]^(crc>>>8);
      crc=crc^0xFFFFFFFF;
      return i32LE(crc);
    }

    var stem=(title||'board').replace(/\s+/g,'_');
    var entries=[
      zipEntry(stem+'.shp',shpData),
      zipEntry(stem+'.shx',shxData),
      zipEntry(stem+'.dbf',dbfBuf),
      zipEntry(stem+'.prj',new TextEncoder().encode(prj))
    ];

    // Central directory
    var cdOffset=entries.reduce(function(s,e){return s+e.local.length;},0);
    var cdParts=[];var localOff=0;
    entries.forEach(function(e){
      cdParts.push(concat([
        new Uint8Array([0x50,0x4B,0x01,0x02]),  // central dir sig
        new Uint8Array([0x14,0x00,0x14,0x00]),  // versions
        new Uint8Array([0x00,0x00,0x00,0x00]),  // flags + compression
        new Uint8Array([0x00,0x00,0x00,0x00]),  // time/date
        e.crc,
        i32LE(e.size),i32LE(e.size),
        new Uint8Array([e.name.length,0]),
        new Uint8Array([0x00,0x00,0x00,0x00,0x00,0x00]),
        new Uint8Array([0x00,0x00,0x00,0x00]),
        i32LE(localOff),
        e.name
      ]));
      localOff+=e.local.length;
    });
    var cd=concat(cdParts);
    var eocd=concat([
      new Uint8Array([0x50,0x4B,0x05,0x06]),
      new Uint8Array([0x00,0x00,0x00,0x00]),
      new Uint8Array([entries.length&0xFF,(entries.length>>8)&0xFF]),
      new Uint8Array([entries.length&0xFF,(entries.length>>8)&0xFF]),
      i32LE(cd.length),
      i32LE(cdOffset),
      new Uint8Array([0x00,0x00])
    ]);

    var zip=concat(entries.map(function(e){return e.local;}).concat([cd,eocd]));
    downloadBlob(new Blob([zip],{type:'application/zip'}),stem+'_shapefile.zip');
  }

  // ── table ─────────────────────────────────────────────────────────────
  function renderTable(){
    var filtered=getSorted(getFiltered());
    var el=document.getElementById('tableView');
    var rc=document.getElementById('resultCount');
    if(rc)rc.textContent=filterText?(filtered.length+' of '+rows.length):'';
    if(!filtered.length){el.innerHTML='<div class="no-results">No rows match your search.</div>';return;}
    var coordSet={};coordSet[latCol]=true;coordSet[lngCol]=true;
    var html='<table><thead><tr>';
    if(SHEET_READY)html+='<th class="th-status">Status</th>';
    headers.forEach(function(h){
      var cls=sortCol===h?(sortDir===1?'sort-asc':'sort-desc'):'';
      html+='<th class="'+cls+'" onclick="sortBy(\''+esc(h)+'\')">'+esc(h)+'</th>';
    });
    html+='</tr></thead><tbody>';
    filtered.forEach(function(row){
      var idx=rows.indexOf(row);
      html+='<tr class="'+(selectedRow===row?'highlighted':'')+'" onclick="selectRow('+idx+')">';
      if(SHEET_READY)html+='<td>'+rowStatusBadge(row)+'</td>';
      headers.forEach(function(h){
        var val=row[h]!=null?row[h]:'';
        html+='<td class="'+(coordSet[h]?'coord':'')+'" title="'+esc(val)+'">'+esc(val||'—')+'</td>';
      });
      html+='</tr>';
    });
    html+='</tbody></table>';
    el.innerHTML=html;
  }

  function renderDetailReviews(row){
    var el=document.getElementById('reviewsList');if(!el||!SHEET_READY)return;
    var k=rowKey(row),revs=reviewCache[k]||[];
    if(!revs.length){el.innerHTML='';return;}
    var aL={approve:'✓ Approved',reject:'✕ Rejected',flag:'⚑ Flagged',comment:'✎ Comment'};
    var aB={approve:'badge-approve',reject:'badge-reject',flag:'badge-flag',comment:'badge-comment'};
    var html='<div class="review-label">Previous reviews ('+revs.length+')</div><div class="reviews-list">';
    revs.slice().reverse().forEach(function(rev){
      html+='<div class="review-item"><div class="review-item-top"><span class="badge '+(aB[rev.action]||'badge-comment')+'">'+esc(aL[rev.action]||rev.action)+'</span><span style="font-size:13px;color:var(--text-secondary);">'+esc(rev.reviewer||'anonymous')+'</span><span class="review-item-meta">'+esc(fmtDate(rev.timestamp))+'</span></div>'+(rev.comment?'<div class="review-item-body">'+esc(rev.comment)+'</div>':'')+' </div>';
    });
    html+='</div>';el.innerHTML=html;
  }

  // ── map ───────────────────────────────────────────────────────────────
  function initMap(){
    if(leafletMap)return;
    if(typeof L==='undefined'){var mv=document.getElementById('mapView');if(mv)mv.innerHTML='<div class="no-results">Map unavailable.</div>';return;}
    leafletMap=L.map('map',{zoomControl:true});
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{attribution:'\u00a9 OpenStreetMap \u00a9 CartoDB',subdomains:'abcd',maxZoom:19}).addTo(leafletMap);
    markerLayer=L.featureGroup().addTo(leafletMap);
    renderMarkers();
  }
  function renderMarkers(){
    if(!leafletMap||!markerLayer)return;
    markerLayer.clearLayers();
    getSorted(getFiltered()).forEach(function(row){
      var lat=parseFloat(row[latCol]),lng=parseFloat(row[lngCol]);
      if(isNaN(lat)||isNaN(lng))return;
      var color=markerColor(row);
      var icon=L.divIcon({className:'',html:'<div style="width:10px;height:10px;background:'+color+';border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.28);"></div>',iconSize:[10,10],iconAnchor:[5,5]});
      var lbl=getLabel(row);
      var extra=headers.filter(function(h){return h!==latCol&&h!==lngCol;}).slice(0,5).map(function(h){return row[h]?'<span><strong>'+esc(h)+':</strong> '+esc(row[h])+'</span>':'';}).filter(Boolean).join('<br>');
      L.marker([lat,lng],{icon:icon}).addTo(markerLayer).bindPopup('<div class="popup-title">'+esc(lbl)+'</div><div class="popup-coords">'+lat.toFixed(5)+', '+lng.toFixed(5)+'</div>'+(extra?'<div class="popup-fields">'+extra+'</div>':''));
    });
    if(markerLayer.getLayers().length>0){try{leafletMap.fitBounds(markerLayer.getBounds(),{padding:[40,40]});}catch(_){}}
  }

  window.submitAction=function(action){
    if(!selectedRow)return;
    var ci=document.getElementById('commentInput'),rni=document.getElementById('reviewerName'),fb=document.getElementById('reviewFeedback');
    var comment=ci?ci.value.trim():'',reviewer=rni?rni.value.trim():'';
    if(action==='comment'&&!comment){fb.textContent='Please write a comment first.';fb.className='review-feedback visible err';return;}
    var btns=['btnApprove','btnReject','btnFlag','btnComment'];
    btns.forEach(function(id){var b=document.getElementById(id);if(b)b.disabled=true;});
    if(ci)ci.disabled=true;if(rni)rni.disabled=true;if(fb){fb.className='review-feedback';fb.textContent='';}
    postReview(selectedRow,action,comment,reviewer,function(ok,errMsg){
      btns.forEach(function(id){var b=document.getElementById(id);if(b)b.disabled=false;});
      if(ci){ci.disabled=false;ci.value='';}if(rni)rni.disabled=false;
      if(ok){fb.textContent='Review submitted.';fb.className='review-feedback visible ok';renderDetailReviews(selectedRow);renderTable();if(leafletMap)renderMarkers();}
      else{fb.textContent='Failed: '+(errMsg||'unknown error');fb.className='review-feedback visible err';}
    });
  };

  // ── initial load ──────────────────────────────────────────────────────
  renderTable();
  fetchReviews(function(ok){
    var el=document.getElementById('sheetStatus');if(!SHEET_READY||!el)return;
    if(ok){var t=Object.keys(reviewCache).reduce(function(n,k){return n+reviewCache[k].length;},0);el.className='sheet-status ok';el.textContent=t+' review'+(t===1?'':'s');}
    else{el.className='sheet-status err';el.textContent='sheet error';}
    renderTable();if(leafletMap)renderMarkers();
  });

})();
</script>
</body>
</html>
