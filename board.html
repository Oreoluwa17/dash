<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSV Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e4e2db;
    --border-strong: #c8c5bb;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-hint: #a09d96;
    --accent: #1a1916;
    --radius: 10px;
    --radius-sm: 6px;
    --header-h: 56px;
    --tabs-h: 48px;
  }

  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    display: flex;
    flex-direction: column;
  }

  /* ─── top bar ─── */
  .topbar {
    height: var(--header-h);
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    flex-shrink: 0;
  }

  .board-title {
    font-size: 15px;
    font-weight: 500;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-count {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-hint);
    white-space: nowrap;
  }

  .back-link {
    font-size: 13px;
    color: var(--text-secondary);
    text-decoration: none;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 5px 10px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    transition: border-color 0.12s, color 0.12s;
  }
  .back-link:hover { border-color: var(--border-strong); color: var(--text-primary); }

  /* ─── tabs ─── */
  .tabs {
    height: var(--tabs-h);
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: flex-end;
    padding: 0 20px;
    gap: 2px;
    flex-shrink: 0;
  }

  .tab {
    padding: 9px 16px 10px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-secondary);
    border-bottom: 2px solid transparent;
    transition: color 0.12s, border-color 0.12s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
  .tab:hover { color: var(--text-primary); }
  .tab.active { color: var(--text-primary); font-weight: 500; border-bottom-color: var(--text-primary); }

  /* ─── search / filter bar ─── */
  .toolbar {
    padding: 10px 20px;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }

  .search-wrap {
    position: relative;
    flex: 1;
    max-width: 360px;
  }

  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; stroke: var(--text-hint); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
  }

  .search-input {
    width: 100%;
    padding: 7px 10px 7px 32px;
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    background: var(--surface);
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius-sm);
    color: var(--text-primary);
    transition: border-color 0.15s;
  }
  .search-input:focus { outline: none; border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-hint); }

  .result-count {
    font-size: 12px;
    color: var(--text-hint);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }

  /* ─── views wrapper ─── */
  .views {
    flex: 1;
    overflow: hidden;
    position: relative;
  }

  .view {
    position: absolute; inset: 0;
    opacity: 0; pointer-events: none;
    transition: opacity 0.18s;
  }
  .view.active { opacity: 1; pointer-events: auto; }

  /* ─── table view ─── */
  #tableView {
    overflow-y: auto;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 500;
    font-family: 'DM Mono', monospace;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
  }
  thead th:hover { color: var(--text-secondary); }
  thead th.sort-asc::after { content: ' ↑'; }
  thead th.sort-desc::after { content: ' ↓'; }

  tbody tr {
    border-bottom: 0.5px solid var(--border);
    transition: background 0.1s;
    cursor: pointer;
  }
  tbody tr:hover { background: var(--bg); }
  tbody tr.highlighted { background: #fdf9ee; }
  tbody tr.highlighted:hover { background: #faf4e0; }

  tbody td {
    padding: 10px 14px;
    color: var(--text-primary);
    white-space: nowrap;
    max-width: 240px;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  tbody td.coord {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-hint);
  }

  .no-results {
    padding: 48px 24px;
    text-align: center;
    font-size: 14px;
    color: var(--text-hint);
  }

  /* ─── map view ─── */
  #mapView { overflow: hidden; }
  #map { width: 100%; height: 100%; }

  .leaflet-popup-content-wrapper {
    border-radius: var(--radius-sm) !important;
    box-shadow: 0 2px 16px rgba(0,0,0,0.12) !important;
    border: 0.5px solid var(--border);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
  }
  .leaflet-popup-tip { background: var(--surface); }

  .popup-title { font-weight: 500; margin-bottom: 6px; }
  .popup-coords {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }
  .popup-fields { font-size: 12px; line-height: 1.8; color: var(--text-secondary); }
  .popup-fields strong { color: var(--text-primary); font-weight: 500; }

  /* ─── detail panel ─── */
  .detail-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 0.5px solid var(--border);
    padding: 16px 20px;
    transform: translateY(100%);
    transition: transform 0.22s cubic-bezier(0.22, 1, 0.36, 1);
    z-index: 10;
    max-height: 45%;
    overflow-y: auto;
  }
  .detail-panel.open { transform: translateY(0); }

  .detail-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 12px;
  }
  .detail-title { font-weight: 500; font-size: 14px; flex: 1; }
  .detail-close {
    background: none; border: none; cursor: pointer;
    color: var(--text-hint); font-size: 18px; line-height: 1;
    padding: 2px 6px; border-radius: 4px;
  }
  .detail-close:hover { color: var(--text-primary); background: var(--bg); }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px;
  }
  .detail-cell {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 8px 10px;
  }
  .detail-key {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-hint);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-family: 'DM Mono', monospace;
    margin-bottom: 3px;
  }
  .detail-val {
    font-size: 13px;
    color: var(--text-primary);
    word-break: break-word;
  }

  /* ─── error state ─── */
  .error-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 12px;
    text-align: center;
    padding: 40px;
  }
  .error-state h2 { font-size: 18px; font-weight: 400; }
  .error-state p { font-size: 14px; color: var(--text-secondary); max-width: 360px; line-height: 1.6; }
  .error-state a {
    margin-top: 4px;
    font-size: 13px;
    padding: 8px 18px;
    background: var(--accent);
    color: #f8f7f4;
    border-radius: var(--radius-sm);
    text-decoration: none;
    transition: opacity 0.12s;
  }
  .error-state a:hover { opacity: 0.85; }

  @media (max-width: 600px) {
    .topbar { padding: 0 12px; }
    .tabs { padding: 0 12px; }
    .toolbar { padding: 8px 12px; }
    tbody td { padding: 9px 10px; }
    thead th { padding: 9px 10px; }
  }
</style>
</head>
<body>

<div id="app"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  const app = document.getElementById('app');

  function renderError(title, message) {
    document.title = 'CSV Board';
    app.innerHTML = `
      <div class="error-state">
        <h2>${title}</h2>
        <p>${message}</p>
        <a href="index.html">← Upload a CSV</a>
      </div>`;
  }

  const hash = window.location.hash.slice(1);
  if (!hash) { renderError('No board data found.', 'This link doesn\'t contain any board data. Upload a CSV to generate a valid link.'); return; }

  let payload;
  try {
    const json = decodeURIComponent(escape(atob(hash)));
    payload = JSON.parse(json);
  } catch {
    renderError('Invalid board link.', 'The link appears to be corrupted or incomplete. Try generating a new one.'); return;
  }

  const { title, latCol, lngCol, labelCol, headers, rows } = payload;
  if (!rows || rows.length === 0) { renderError('Empty board.', 'No rows found in this board data.'); return; }

  document.title = title || 'CSV Board';

  let currentView = 'table';
  let sortCol = null;
  let sortDir = 1;
  let filterText = '';
  let selectedRow = null;

  function getLabel(row) {
    if (labelCol && row[labelCol]) return row[labelCol];
    return row[latCol] + ', ' + row[lngCol];
  }

  function getFiltered() {
    if (!filterText) return rows;
    const q = filterText.toLowerCase();
    return rows.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q)));
  }

  function getSorted(arr) {
    if (!sortCol) return arr;
    return [...arr].sort((a, b) => {
      const va = a[sortCol] || ''; const vb = b[sortCol] || '';
      const na = parseFloat(va); const nb = parseFloat(vb);
      if (!isNaN(na) && !isNaN(nb)) return (na - nb) * sortDir;
      return va.localeCompare(vb) * sortDir;
    });
  }

  function buildLayout() {
    app.innerHTML = `
      <div class="topbar">
        <a class="back-link" href="index.html">← Upload</a>
        <span class="board-title">${escHtml(title || 'Data Board')}</span>
        <span class="row-count" id="rowCount">${rows.length} rows</span>
      </div>
      <div class="tabs">
        <button class="tab active" id="tabTable" onclick="switchTab('table')">
          <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          Table
        </button>
        <button class="tab" id="tabMap" onclick="switchTab('map')">
          <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
          Map
        </button>
      </div>
      <div class="toolbar">
        <div class="search-wrap">
          <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input class="search-input" id="searchInput" placeholder="Search rows…" oninput="onSearch(this.value)" />
        </div>
        <span class="result-count" id="resultCount"></span>
      </div>
      <div class="views">
        <div class="view active" id="tableView"></div>
        <div class="view" id="mapView"><div id="map"></div></div>
      </div>
      <div class="detail-panel" id="detailPanel">
        <div class="detail-header">
          <span class="detail-title" id="detailTitle"></span>
          <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-grid" id="detailGrid"></div>
      </div>`;
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  let leafletMap = null;
  let markerLayer = null;

  function initMap() {
    if (leafletMap) return;
    leafletMap = L.map('map', { zoomControl: true });
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap © CartoDB',
      subdomains: 'abcd', maxZoom: 19
    }).addTo(leafletMap);
    markerLayer = L.featureGroup().addTo(leafletMap);
    renderMarkers();
  }

  function renderMarkers() {
    if (!leafletMap) return;
    markerLayer.clearLayers();
    const filtered = getSorted(getFiltered());
    const icon = L.divIcon({
      className: '',
      html: `<div style="width:10px;height:10px;background:#1a1916;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3);"></div>`,
      iconSize: [10, 10], iconAnchor: [5, 5]
    });
    filtered.forEach(row => {
      const lat = parseFloat(row[latCol]);
      const lng = parseFloat(row[lngCol]);
      if (isNaN(lat) || isNaN(lng)) return;
      const label = getLabel(row);
      const fieldsHtml = headers
        .filter(h => h !== latCol && h !== lngCol)
        .slice(0, 6)
        .map(h => row[h] ? `<span><strong>${escHtml(h)}:</strong> ${escHtml(row[h])}</span>` : '')
        .filter(Boolean).join('<br>');
      const m = L.marker([lat, lng], { icon }).addTo(markerLayer);
      m.bindPopup(`<div class="popup-title">${escHtml(label)}</div><div class="popup-coords">${lat.toFixed(5)}, ${lng.toFixed(5)}</div>${fieldsHtml ? '<div class="popup-fields">' + fieldsHtml + '</div>' : ''}`);
    });
    if (markerLayer.getLayers().length > 0) {
      try { leafletMap.fitBounds(markerLayer.getBounds(), { padding: [40, 40] }); } catch {}
    }
  }

  function renderTable() {
    const filtered = getSorted(getFiltered());
    const el = document.getElementById('tableView');
    if (!el) return;

    document.getElementById('resultCount').textContent = filterText ? filtered.length + ' of ' + rows.length : '';

    if (filtered.length === 0) {
      el.innerHTML = '<div class="no-results">No rows match your search.</div>'; return;
    }

    const coordCols = new Set([latCol, lngCol]);
    let html = '<table><thead><tr>';
    headers.forEach(h => {
      let cls = sortCol === h ? (sortDir === 1 ? 'sort-asc' : 'sort-desc') : '';
      html += `<th class="${cls}" onclick="sortBy('${escHtml(h)}')">${escHtml(h)}</th>`;
    });
    html += '</tr></thead><tbody>';

    filtered.forEach((row, i) => {
      const isSelected = selectedRow === row;
      html += `<tr class="${isSelected ? 'highlighted' : ''}" onclick="selectRow(${rows.indexOf(row)})">`;
      headers.forEach(h => {
        html += `<td class="${coordCols.has(h) ? 'coord' : ''}" title="${escHtml(row[h] || '')}">${escHtml(row[h] || '—')}</td>`;
      });
      html += '</tr>';
    });
    html += '</tbody></table>';
    el.innerHTML = html;
  }

  window.switchTab = function(tab) {
    currentView = tab;
    document.getElementById('tabTable').classList.toggle('active', tab === 'table');
    document.getElementById('tabMap').classList.toggle('active', tab === 'map');
    document.getElementById('tableView').classList.toggle('active', tab === 'table');
    document.getElementById('mapView').classList.toggle('active', tab === 'map');
    if (tab === 'map') {
      setTimeout(() => {
        initMap();
        leafletMap.invalidateSize();
      }, 50);
    }
  };

  window.onSearch = function(val) {
    filterText = val;
    renderTable();
    if (leafletMap) renderMarkers();
  };

  window.sortBy = function(col) {
    if (sortCol === col) sortDir *= -1;
    else { sortCol = col; sortDir = 1; }
    renderTable();
  };

  window.selectRow = function(idx) {
    selectedRow = rows[idx];
    const panel = document.getElementById('detailPanel');
    document.getElementById('detailTitle').textContent = getLabel(selectedRow);
    const grid = document.getElementById('detailGrid');
    grid.innerHTML = headers.map(h =>
      `<div class="detail-cell"><div class="detail-key">${escHtml(h)}</div><div class="detail-val">${escHtml(selectedRow[h] || '—')}</div></div>`
    ).join('');
    panel.classList.add('open');
    renderTable();
  };

  window.closeDetail = function() {
    selectedRow = null;
    document.getElementById('detailPanel').classList.remove('open');
    renderTable();
  };

  buildLayout();
  renderTable();
})();
</script>
</body>
</html>
